<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-body-tertiary">
    <div class="app-shell min-vh-100 py-4 py-md-5">
      <div class="container container-narrow">
        <header class="text-center mb-4">
          <h1 class="h2 fw-semibold mb-1">Todo</h1>
          <p class="text-body-secondary small mb-0">
            Add tasks, check them off, remove what you don’t need.
          </p>
        </header>

        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <div
              id="app-alert"
              class="alert alert-warning mb-4 d-none"
              role="alert"
            ></div>
            <!-- Add task form -->
            <form id="todo-form" class="mb-4" novalidate>
              <label for="todo-input" class="form-label visually-hidden"
                >New task</label
              >
              <div class="input-group input-group-lg">
                <input
                  type="text"
                  id="todo-input"
                  class="form-control"
                  placeholder="What do you need to do?"
                  autocomplete="off"
                  maxlength="500"
                  aria-describedby="todo-input-help"
                />
                <button type="submit" class="btn btn-primary px-4">Add</button>
              </div>
              <div class="row g-2 align-items-end mt-3">
                <div class="col">
                  <label for="todo-category" class="form-label small mb-1"
                    >Category</label
                  >
                  <select
                    class="form-select"
                    id="todo-category"
                    aria-describedby="todo-input-help"
                  >
                    <option value="Work">Work</option>
                    <option value="Study">Study</option>
                    <option value="Health">Health</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Personal">Personal</option>
                    <option value="Other" selected>Other</option>
                    <option value="__ai__">Auto (AI)</option>
                  </select>
                </div>
              </div>
              <div id="todo-input-help" class="form-text mt-2">
                Press <kbd>Enter</kbd> or tap <strong>Add</strong>.
              </div>
            </form>

            <!-- Task list -->
            <div id="empty-state" class="empty-state text-center py-5 d-none">
              <p class="text-body-secondary mb-0">
                No tasks yet. Add one above to get started.
              </p>
            </div>
            <ul
              id="todo-list"
              class="list-group list-group-flush todo-list"
              aria-label="Task list"
            ></ul>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="js/gemini.js" defer></script>
    <script src="js/app.js" defer></script>
  </body>
</html>
